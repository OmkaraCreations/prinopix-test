<!DOCTYPE html>
<html>
<head>
  <title>Event Face Match</title>

  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/event.css">
</head>

<body>

<header class="event-header">

  <div class="event-title-wrapper">
    <div class="event-title" id="eventTitle">
      Loading Event...
    </div>
  </div>

  <div class="header-actions">
    <button id="showAllBtn" class="header-btn">
      View All
    </button>

    <button id="layoutToggleBtn" class="header-btn">
      Rearrange
    </button>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <span id="loaderText">Loading Event Photos...</span>
  </div>

</header>



<div id="results" class="gallery"></div>

<button id="floatingUploadBtn" class="floating-btn">
  📸 Match Selfie
</button>



<input type="file" id="cameraInput" accept="image/*"capture="environment"hidden>
<input type="file" id="galleryInput" accept="image/*"hidden>

<!-- Image Modal -->
<div id="imageModal" class="image-modal">
  <span class="close-modal" id="closeModal">&times;</span>
  <img id="modalImage">
</div>

<!-- Popup -->
<div id="popupOverlay" class="popup-overlay">
  <div class="popup-box">
    <div id="popupMessage"></div>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script type="module" src="js/event.js"></script>

</body>
</html>
